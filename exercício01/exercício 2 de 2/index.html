<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de idade</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    
    <h1>Verificador de Idade</h1>
    
    <main>
        <div>
            <label for="anoNascimento">Ano de nascimento: </label><input type="number" id="anoNascimento" min="1900">
            <p>Marque o seu gênero:</p>
            <input type="radio" value="m" name="genero" id="m">
            <label for="m">Masculino</label>
            <input type="radio" value="f" name="genero" id="f">
            <label for="f">Feminino</label><br>
            <button id="verificar">Verificar</button>
        </div>

        <div id="imagem">
            <p>Você é <span id="genero"></span> de <span id="idade"></span> anos de idade</p>
            <div>

            </div>
        </div>
    </main>

    <div id="copyrigtht">
        <p>
            layout criado por &copy;<em>CursoEmVídeo</em><br>
            site recriado por <em>EmilliGiuliane</em>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
